<!DOCTYPE html>
<html><body>
<p>Right-click each image and "Save Image As" to the workout-tracker folder:</p>
<canvas id="c192" width="192" height="192"></canvas>
<p>Save as: icon-192.png</p>
<canvas id="c512" width="512" height="512"></canvas>
<p>Save as: icon-512.png</p>
<script>
function draw(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  const r = size * 0.15;

  // Rounded rect background
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();

  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#6c5ce7');
  grad.addColorStop(1, '#a29bfe');
  ctx.fillStyle = grad;
  ctx.fill();

  // Dumbbell icon
  const cx = size / 2, cy = size / 2;
  const s = size / 8;
  ctx.strokeStyle = '#fff';
  ctx.fillStyle = '#fff';
  ctx.lineWidth = size * 0.04;
  ctx.lineCap = 'round';

  // Bar
  ctx.beginPath();
  ctx.moveTo(cx - s * 2.5, cy);
  ctx.lineTo(cx + s * 2.5, cy);
  ctx.stroke();

  // Left weights
  ctx.fillRect(cx - s * 2.5, cy - s * 1.5, s * 0.7, s * 3);
  ctx.fillRect(cx - s * 1.6, cy - s * 1.1, s * 0.5, s * 2.2);

  // Right weights
  ctx.fillRect(cx + s * 1.8, cy - s * 1.5, s * 0.7, s * 3);
  ctx.fillRect(cx + s * 1.1, cy - s * 1.1, s * 0.5, s * 2.2);
}
draw('c192', 192);
draw('c512', 512);
</script>
</body></html>

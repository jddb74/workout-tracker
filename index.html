<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Linsey's Fit">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Linsey's Fit</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3345;
  --text: #e4e6ef;
  --text2: #8b8fa3;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --green: #00cec9;
  --red: #ff6b6b;
  --orange: #fdcb6e;
  --blue: #74b9ff;
  --push: #6c5ce7;
  --legs-a: #00cec9;
  --core: #fdcb6e;
  --pull: #74b9ff;
  --yoga-fri: #fdcb6e;
  --legs-b: #ff6b6b;
  --nidra: #55efc4;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  padding-top: env(safe-area-inset-top, 0);
}
button { cursor:pointer; font-family:inherit; }
input, select, textarea { font-family:inherit; font-size:16px !important; }

/* NAV */
.nav {
  position: fixed; bottom:0; left:0; right:0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav button {
  flex:1;
  background: none;
  border: none;
  color: var(--text2);
  padding: 10px 4px 8px;
  font-size: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  transition: color .2s;
  -webkit-tap-highlight-color: transparent;
}
.nav button.active { color: var(--accent2); }
.nav button svg { width:22px; height:22px; }

/* PAGES */
.page { display:none; padding: 16px 16px 90px; max-width: 700px; margin: 0 auto; }
.page.active { display:block; }

/* COMMON */
h1 { font-size:24px; margin-bottom:16px; font-weight:700; }
h2 { font-size:18px; margin-bottom:12px; font-weight:600; }
h3 { font-size:15px; margin-bottom:8px; font-weight:600; color:var(--text2); }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 12px 24px;
  font-size: 15px;
  font-weight: 600;
  transition: opacity .2s;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover { opacity:.85; }
.btn:active { opacity:.7; }
.btn.secondary {
  background: var(--surface2);
  color: var(--text);
}
.btn.danger { background: var(--red); }
.btn.small { padding:6px 14px; font-size:13px; }

.badge {
  display:inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.form-group { margin-bottom: 14px; }
.form-group label {
  display:block;
  font-size:13px;
  color: var(--text2);
  margin-bottom:5px;
  font-weight:500;
}
.form-group input, .form-group select, .form-group textarea {
  width:100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--text);
  font-size: 16px !important;
  outline: none;
  -webkit-appearance: none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--accent);
}
.form-group textarea { resize:vertical; min-height:60px; }

.slider-container {
  display:flex; align-items:center; gap:12px;
}
.slider-container input[type=range] {
  flex:1;
  -webkit-appearance:none;
  height:6px;
  border-radius:3px;
  background: linear-gradient(to right, var(--green), var(--orange), var(--red));
  outline:none;
  border:none;
  padding:0;
}
.slider-container input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:24px; height:24px;
  border-radius:50%;
  background:#fff;
  cursor:pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,.3);
}
.slider-val {
  font-size:20px;
  font-weight:700;
  min-width:30px;
  text-align:center;
}

.day-badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size:12px;
  font-weight:600;
  color:#fff;
}
.day-monday { background: var(--push); }
.day-tuesday { background: var(--legs-a); }
.day-wednesday { background: var(--core); color:#333; }
.day-thursday { background: var(--pull); }
.day-friday { background: var(--yoga-fri); color:#333; }
.day-saturday { background: var(--legs-b); }
.day-sunday { background: var(--nidra); color:#333; }

.flex { display:flex; }
.flex-between { display:flex; justify-content:space-between; align-items:center; }
.gap-8 { gap:8px; }
.gap-12 { gap:12px; }
.mt-8 { margin-top:8px; }
.mt-12 { margin-top:12px; }
.mt-16 { margin-top:16px; }
.mb-8 { margin-bottom:8px; }
.mb-16 { margin-bottom:16px; }

/* DASHBOARD */
.streak-dots {
  display:flex; gap:6px; flex-wrap:wrap;
}
.streak-dot {
  width:42px; height:42px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:600;
  border: 2px solid var(--border);
  color: var(--text2);
  background: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  padding: 0;
}
.streak-dot.completed { border-color: var(--green); color: var(--green); background: rgba(0,206,201,.1); }
.streak-dot.today { border-color: var(--accent2); color: var(--accent2); }

.pr-banner {
  background: linear-gradient(135deg, rgba(108,92,231,.15), rgba(162,155,254,.1));
  border: 1px solid rgba(108,92,231,.3);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 12px;
}
.pr-banner .pr-item {
  font-size:13px;
  padding: 4px 0;
  display:flex; justify-content:space-between;
}

/* PROGRAM SELECTOR */
.program-selector {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.program-selector label {
  font-size: 13px;
  color: var(--text2);
  font-weight: 500;
  white-space: nowrap;
}
.program-selector select {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-size: 14px !important;
  outline: none;
  -webkit-appearance: none;
}

/* WORKOUT LOG */
.exercise-card {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
}
.exercise-card .ex-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:10px;
}
.exercise-card .ex-name { font-weight:600; font-size:14px; }
.exercise-card .ex-target { font-size:12px; color:var(--text2); }
.set-row {
  display:flex; align-items:center; gap:8px; margin-bottom:6px;
}
.set-row .set-num {
  font-size:12px; color:var(--text2); min-width:32px; font-weight:600;
}
.set-row input {
  width:72px;
  background: var(--surface);
  border:1px solid var(--border);
  border-radius:6px;
  padding:8px;
  color:var(--text);
  font-size:16px !important;
  text-align:center;
  outline:none;
  -webkit-appearance: none;
}
.set-row input:focus { border-color:var(--accent); }
.set-row .remove-set {
  background:none; border:none; color:var(--red); font-size:20px; padding:0 6px;
  opacity:.6;
  min-width:28px;
}
.set-row .remove-set:active { opacity:1; }
.add-set-btn {
  background:none; border:1px dashed var(--border);
  color:var(--text2); border-radius:6px;
  padding:8px; width:100%; font-size:13px;
  margin-top:4px;
}
.add-set-btn:active { border-color:var(--accent); color:var(--accent); }

/* WARMUP SECTION */
.warmup-section {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
}
.warmup-toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.warmup-toggle h3 { margin-bottom: 0; color: var(--text); }
.warmup-toggle .toggle-icon {
  font-size: 18px;
  color: var(--text2);
  transition: transform .2s;
}
.warmup-toggle .toggle-icon.open { transform: rotate(180deg); }
.warmup-items {
  margin-top: 12px;
}
.warmup-items.collapsed { display: none; }
.warmup-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.warmup-item:last-child { border-bottom: none; }
.warmup-item input[type=checkbox] {
  width: 20px;
  height: 20px;
  accent-color: var(--green);
  flex-shrink: 0;
}
.warmup-item label {
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
}
.warmup-item .warmup-detail {
  font-size: 12px;
  color: var(--text2);
}

/* CALENDAR */
.cal-grid {
  display:grid;
  grid-template-columns: repeat(7, 1fr);
  gap:4px;
}
.cal-header {
  text-align:center;
  font-size:11px;
  color:var(--text2);
  font-weight:600;
  padding:4px;
}
.cal-day {
  aspect-ratio:1;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  font-size:13px;
  cursor:pointer;
  position:relative;
  background: var(--surface);
  border: 1px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
.cal-day:active { background: var(--surface2); }
.cal-day.empty { background:transparent; cursor:default; }
.cal-day.empty:active { background:transparent; }
.cal-day.today { border-color: var(--accent); }
.cal-day.has-workout::after {
  content:'';
  position:absolute;
  bottom:3px;
  width:6px; height:6px;
  border-radius:50%;
}
.cal-day.wt-monday::after { background:var(--push); }
.cal-day.wt-tuesday::after { background:var(--legs-a); }
.cal-day.wt-wednesday::after { background:var(--core); }
.cal-day.wt-thursday::after { background:var(--pull); }
.cal-day.wt-friday::after { background:var(--yoga-fri); }
.cal-day.wt-saturday::after { background:var(--legs-b); }
.cal-day.wt-sunday::after { background:var(--nidra); }

.cal-nav {
  display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;
}
.cal-nav button {
  background:var(--surface2); border:none; color:var(--text);
  border-radius:8px; padding:10px 16px; font-size:16px;
  -webkit-tap-highlight-color: transparent;
}

/* PR BOARD */
.pr-card {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
}
.pr-card .pr-exercise { font-weight:600; font-size:14px; margin-bottom:6px; }
.pr-row {
  display:flex; justify-content:space-between; font-size:13px;
  padding:3px 0;
  color: var(--text2);
}
.pr-row .pr-value { color:var(--text); font-weight:600; }
.pr-new {
  display:inline-block;
  background: rgba(108,92,231,.2);
  color: var(--accent2);
  font-size:10px;
  font-weight:700;
  padding:2px 6px;
  border-radius:4px;
  margin-left:6px;
}

/* CARDIO LOG CARD */
.cardio-log-card {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
}

/* SESSION DETAIL MODAL */
.modal-overlay {
  display:none;
  position:fixed; inset:0;
  background:rgba(0,0,0,.6);
  z-index:200;
  align-items:flex-end;
  justify-content:center;
  padding:0;
}
.modal-overlay.active { display:flex; }
.modal {
  background: var(--surface);
  border-radius: var(--radius) var(--radius) 0 0;
  padding:20px;
  padding-bottom: calc(20px + env(safe-area-inset-bottom, 0));
  max-width:500px;
  width:100%;
  max-height:85vh;
  overflow-y:auto;
  border: 1px solid var(--border);
  border-bottom:none;
}
.modal h2 { margin-bottom:16px; }
.modal-close {
  background:none; border:none; color:var(--text2);
  font-size:28px; float:right; line-height:1;
  padding:4px 8px;
}

/* Toast */
.toast {
  position:fixed; top: calc(12px + env(safe-area-inset-top, 0)); left:50%; transform:translateX(-50%);
  background:var(--green); color:#111;
  padding:10px 24px; border-radius:8px;
  font-weight:600; font-size:14px;
  z-index:300;
  opacity:0; transition:opacity .3s;
  pointer-events:none;
}
.toast.show { opacity:1; }

/* Chart containers */
.chart-container {
  background: var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:12px;
  margin-bottom:16px;
}
.chart-container canvas { max-height:250px; }

/* Responsive */
@media (min-width:500px) {
  .set-row input { width:85px; }
  .modal-overlay { align-items:center; padding:16px; }
  .modal { border-radius:var(--radius); border-bottom:1px solid var(--border); padding-bottom:20px; }
}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- SESSION DETAIL MODAL -->
<div class="modal-overlay" id="sessionModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="sessionModalContent"></div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button onclick="showPage('dashboard')" id="nav-dashboard" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </button>
  <button onclick="showPage('log')" id="nav-log">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    Log
  </button>
  <button onclick="showPage('charts')" id="nav-charts">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Charts
  </button>
  <button onclick="showPage('history')" id="nav-history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    History
  </button>
  <button onclick="showPage('prs')" id="nav-prs">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    PRs
  </button>
</nav>

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">
  <h1>Linsey's Fit</h1>
  <div class="program-selector">
    <label>Program:</label>
    <select id="programSelect" onchange="switchProgram(this.value)"></select>
  </div>
  <div id="dashboard-today" class="card"></div>
  <div id="dashboard-streak" class="card">
    <h3>This Week</h3>
    <div class="streak-dots mt-8" id="streakDots"></div>
  </div>
  <div id="dashboard-prs"></div>
</div>

<!-- LOG WORKOUT -->
<div class="page" id="page-log">
  <h1>Log Workout</h1>
  <div class="card">
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="logDate">
    </div>
    <div class="form-group">
      <label>Workout Day</label>
      <select id="logDayType">
        <option value="monday">Monday — Upper Push</option>
        <option value="tuesday">Tuesday — Lower Body</option>
        <option value="wednesday">Wednesday — Cardio</option>
        <option value="thursday">Thursday — Upper Pull</option>
        <option value="friday">Friday — Cardio</option>
        <option value="saturday">Saturday — Full Body Power</option>
        <option value="sunday">Sunday — Active Cardio</option>
      </select>
    </div>
    <div class="form-group">
      <label>Bodyweight (lbs, optional)</label>
      <input type="number" id="logBodyweight" placeholder="e.g. 145" step="0.1">
    </div>
  </div>

  <div id="logExercises"></div>

  <div class="card">
    <div class="form-group">
      <label>Session Notes</label>
      <textarea id="logNotes" placeholder="How did today feel? Any notes..."></textarea>
    </div>
  </div>

  <button class="btn" style="width:100%;" onclick="saveWorkout()">Save Workout</button>
</div>

<!-- CHARTS -->
<div class="page" id="page-charts">
  <h1>Progress</h1>
  <div class="form-group">
    <label>Exercise</label>
    <select id="chartExercise" onchange="renderProgressChart()"></select>
  </div>
  <div class="card" style="margin-bottom:8px;">
    <div class="flex gap-8">
      <button class="btn small" id="chartModeWeight" onclick="setChartMode('weight')">Weight</button>
      <button class="btn small secondary" id="chartMode1rm" onclick="setChartMode('e1rm')">Est. 1RM</button>
    </div>
  </div>
  <div class="chart-container">
    <canvas id="progressChart"></canvas>
  </div>
  <h2 class="mt-16">Bodyweight</h2>
  <div class="chart-container">
    <canvas id="bwChart"></canvas>
  </div>
</div>

<!-- HISTORY -->
<div class="page" id="page-history">
  <h1>History</h1>
  <div class="cal-nav">
    <button onclick="changeMonth(-1)">&larr;</button>
    <span id="calMonthLabel" style="font-weight:600;font-size:16px;"></span>
    <button onclick="changeMonth(1)">&rarr;</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div id="historyList" class="mt-16"></div>
</div>

<!-- PR BOARD -->
<div class="page" id="page-prs">
  <h1>Personal Records</h1>
  <div id="prBoard"></div>
</div>

<script>
// ==================== EXERCISE DATA ====================

// Shared 10-minute mobility warmup (all strength days)
const WARMUP_EXERCISES = [
  { name:'Hip Circles', sets:1, reps:'10 each', type:'warmup' },
  { name:'Arm Circles', sets:1, reps:'10 each', type:'warmup' },
  { name:'Cat-Cow', sets:1, reps:'10', type:'warmup' },
  { name:'Shoulder Rolls', sets:1, reps:'10', type:'warmup' },
  { name:'Thoracic Rotation', sets:1, reps:'10 each', type:'warmup' },
  { name:'Band Pull-Aparts', sets:1, reps:'15', type:'warmup' },
  { name:'Inchworms', sets:1, reps:'5', type:'warmup' },
  { name:'Leg Swings', sets:1, reps:'10 each', type:'warmup' },
  { name:'Ankle Circles', sets:1, reps:'10 each', type:'warmup' },
  { name:'Deep Squat Hold', sets:1, reps:'30s', type:'warmup' },
];

// ==================== 3-MONTH PROGRAMS ====================
const PROGRAMS = {
  month1: {
    label: 'Month 1 — Foundation',
    program: {
      monday: {
        label: 'Upper Push',
        color: '#6c5ce7',
        cardio: false,
        exercises: [
          ...WARMUP_EXERCISES,
          { name:'Dumbbell Chest Press', sets:3, reps:'12-15', type:'strength' },
          { name:'Dumbbell Shoulder Press', sets:3, reps:'12-15', type:'strength' },
          { name:'Dumbbell Lateral Raise', sets:3, reps:'12-15', type:'strength' },
          { name:'Tricep Kickbacks', sets:3, reps:'12-15', type:'strength' },
          { name:'Band Chest Fly', sets:3, reps:'15', type:'strength' },
          { name:'Push-ups', sets:3, reps:'10-12', type:'strength' },
        ]
      },
      tuesday: {
        label: 'Lower Body',
        color: '#00cec9',
        cardio: false,
        exercises: [
          ...WARMUP_EXERCISES,
          { name:'Dumbbell Squat', sets:3, reps:'12-15', type:'strength' },
          { name:'Romanian Deadlift', sets:3, reps:'12-15', type:'strength' },
          { name:'Dumbbell Lunge', sets:3, reps:'10 each', type:'strength' },
          { name:'Glute Bridge', sets:3, reps:'15', type:'strength' },
          { name:'Band Lateral Walk', sets:3, reps:'15 each', type:'strength' },
          { name:'Calf Raise', sets:3, reps:'15', type:'strength' },
        ]
      },
      wednesday: {
        label: 'Cardio',
        color: '#fdcb6e',
        cardio: true,
        cardioNote: '30 min steady state (bike, elliptical, or treadmill) — moderate intensity, conversational pace',

// Active program reference (set on init)
let PROGRAM = PROGRAMS.month1.program;

const KEY_LIFTS = [
  'Dumbbell Chest Press','Dumbbell Shoulder Press','Dumbbell Row',
  'Romanian Deadlift','Dumbbell Deadlift','Dumbbell Squat',
  'Dumbbell Goblet Squat','Incline Dumbbell Press','Dumbbell Bicep Curl',
  'Dumbbell Lunge','Dumbbell Arnold Press','Dumbbell Thruster',
  'Tricep Overhead Extension','Lateral Raise','Rear Delt Fly',
  'Hammer Curl','Single Leg Deadlift','Walking Lunge',
];

const DAY_NAMES = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
const DAY_LABELS = { monday:'Mon', tuesday:'Tue', wednesday:'Wed', thursday:'Thu', friday:'Fri', saturday:'Sat', sunday:'Sun' };

// ==================== PROGRAM SELECTOR ====================
function getActiveProgram() {
  const data = getData();
  return data.settings.activeProgram || autoDetectProgram();
}

function autoDetectProgram() {
  const month = new Date().getMonth(); // 0-based
  const cycle = ((month - 2) % 3 + 3) % 3; // normalize to 0,1,2
  return ['month1','month2','month3'][cycle];
}

function switchProgram(key) {
  const data = getData();
  data.settings.activeProgram = key;
  saveData(data);
  PROGRAM = PROGRAMS[key].program;
  renderDashboard();
}

function initProgramSelector() {
  const select = document.getElementById('programSelect');
  const activeKey = getActiveProgram();
  select.innerHTML = Object.entries(PROGRAMS).map(([key, val]) =>
    `<option value="${key}" ${key === activeKey ? 'selected' : ''}>${val.label}</option>`
  ).join('');
  PROGRAM = PROGRAMS[activeKey].program;
}

// ==================== DATA LAYER ====================
function getData() {
  const raw = localStorage.getItem('workout_tracker_data');
  if (raw) return JSON.parse(raw);
  return { workouts:[], settings:{ unit:'lbs' } };
}

function saveData(data) {
  localStorage.setItem('workout_tracker_data', JSON.stringify(data));
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2,6);
}

// ==================== NAV ====================
let currentPage = 'dashboard';

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
  window.scrollTo(0, 0);

  if (page === 'dashboard') renderDashboard();
  else if (page === 'log') initLogPage();
  else if (page === 'charts') initChartsPage();
  else if (page === 'history') renderHistory();
  else if (page === 'prs') renderPRBoard();
}

// ==================== TOAST ====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ==================== DASHBOARD ====================
function renderDashboard() {
  initProgramSelector();
  const today = new Date();
  const dayName = DAY_NAMES[today.getDay()];
  const todayDiv = document.getElementById('dashboard-today');
  const program = PROGRAM[dayName];

  if (program) {
    const isCardio = program.cardio;
    const strengthExercises = program.exercises.filter(e => e.type === 'strength');
    let exercisePreview = '';
    if (isCardio) {
      exercisePreview = program.cardioNote || program.label;
    } else {
      exercisePreview = strengthExercises.map(e => `${e.name} (${e.sets}x${e.reps})`).join(' &bull; ');
    }
    todayDiv.innerHTML = `
      <div class="flex-between mb-8">
        <div>
          <h2 style="margin-bottom:4px;">Today's Workout</h2>
          <span class="day-badge day-${dayName}">${dayName.charAt(0).toUpperCase()+dayName.slice(1)} - ${program.label}</span>
        </div>
      </div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:12px;">
        ${exercisePreview}
      </div>
      <button class="btn" onclick="showPage('log')">Start Workout</button>
    `;
  } else {
    todayDiv.innerHTML = `
      <h2 style="margin-bottom:4px;">Rest Day</h2>
      <p style="font-size:14px;color:var(--text2);">Recovery day. Light walk or stretch recommended.</p>
    `;
  }

  renderStreakDots();
  renderDashboardPRs();
}

function renderStreakDots() {
  const data = getData();
  const today = new Date();
  const monday = new Date(today);
  const dayOfWeek = today.getDay();
  const diff = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
  monday.setDate(today.getDate() - diff);

  const dotsDiv = document.getElementById('streakDots');
  let html = '';
  const weekDays = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const dateStr = formatDate(d);
    const hasWorkout = data.workouts.some(w => w.date === dateStr);
    const isToday = dateStr === formatDate(today);
    let cls = 'streak-dot';
    if (hasWorkout) cls += ' completed';
    if (isToday) cls += ' today';
    const dayNames = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
    const dn = dayNames[i];
    html += `<button type="button" class="${cls}" data-date="${dateStr}" data-day="${dn}">${weekDays[i]}</button>`;
  }
  dotsDiv.innerHTML = html;
  dotsDiv.querySelectorAll('.streak-dot').forEach(dot => {
    dot.addEventListener('click', function() {
      goToLog(this.dataset.date, this.dataset.day);
    });
  });
}

function goToLog(dateStr, dayName) {
  currentPage = 'log';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-log').classList.add('active');
  document.getElementById('nav-log').classList.add('active');
  window.scrollTo(0, 0);

  logEditingId = null;
  document.getElementById('logDate').value = dateStr;
  document.getElementById('logDayType').value = dayName;
  document.getElementById('logBodyweight').value = '';
  document.getElementById('logNotes').value = '';
  renderExerciseInputs(dayName);
  document.getElementById('logDayType').onchange = () => renderExerciseInputs(document.getElementById('logDayType').value);
}

function renderDashboardPRs() {
  const prs = calculatePRs();
  const recentPRs = [];
  const sevenDaysAgo = new Date();
  sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

  for (const [exercise, pr] of Object.entries(prs)) {
    if (pr.bestWeightDate && new Date(pr.bestWeightDate) >= sevenDaysAgo) {
      recentPRs.push({ exercise, type:'Weight', value:`${pr.bestWeight} lbs x ${pr.bestWeightReps}` });
    }
    if (pr.best1RMDate && new Date(pr.best1RMDate) >= sevenDaysAgo) {
      recentPRs.push({ exercise, type:'Est. 1RM', value:`${pr.best1RM.toFixed(0)} lbs` });
    }
  }

  const container = document.getElementById('dashboard-prs');
  if (recentPRs.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = `
    <div class="pr-banner">
      <h3 style="color:var(--accent2);margin-bottom:8px;">Recent PRs (7 days)</h3>
      ${recentPRs.slice(0,5).map(p => `
        <div class="pr-item">
          <span>${p.exercise}</span>
          <span style="color:var(--accent2);font-weight:600;">${p.value}</span>
        </div>
      `).join('')}
    </div>
  `;
}

// ==================== LOG WORKOUT ====================
let logEditingId = null;

function initLogPage(editId) {
  logEditingId = editId || null;
  const today = new Date();
  const dateInput = document.getElementById('logDate');
  const daySelect = document.getElementById('logDayType');

  if (logEditingId) {
    const data = getData();
    const w = data.workouts.find(w => w.id === logEditingId);
    if (w) {
      dateInput.value = w.date;
      daySelect.value = w.dayType;
      document.getElementById('logBodyweight').value = w.bodyweight || '';
      document.getElementById('logNotes').value = w.notes || '';
      renderExerciseInputs(w.dayType, w.exercises, w.warmupDone);
      return;
    }
  }

  dateInput.value = formatDate(today);
  const dayName = DAY_NAMES[today.getDay()];
  if (PROGRAM[dayName]) daySelect.value = dayName;
  document.getElementById('logBodyweight').value = '';
  document.getElementById('logNotes').value = '';
  renderExerciseInputs(daySelect.value);

  daySelect.onchange = () => renderExerciseInputs(daySelect.value);
}

function isCardioDay(dayType) {
  const program = PROGRAM[dayType];
  return program && program.cardio === true;
}

function renderExerciseInputs(dayType, savedExercises, savedWarmup) {
  const program = PROGRAM[dayType];
  if (!program) return;
  const container = document.getElementById('logExercises');

  // Cardio days — show simple cardio logging card
  if (isCardioDay(dayType)) {
    const savedCardio = savedExercises && savedExercises[0];
    const savedDuration = savedCardio?.sets?.[0]?.duration || '';
    const savedIntensity = savedCardio?.sets?.[0]?.intensity || 5;
    const dayColor = program.color || 'var(--core)';
    container.innerHTML = `
      <div class="cardio-log-card">
        <h3 style="color:${dayColor};margin-bottom:10px;">${program.label}</h3>
        <p style="font-size:13px;color:var(--text2);margin-bottom:16px;">${program.cardioNote || ''}</p>
        <div class="form-group">
          <label>Duration (minutes)</label>
          <input type="number" id="cardioDuration" placeholder="e.g. 30" value="${savedDuration}" inputmode="numeric">
        </div>
        <div class="form-group">
          <label>Intensity (1 = easy, 10 = max effort) &nbsp;<span class="slider-val" id="intensityVal" style="font-size:16px;">${savedIntensity}</span></label>
          <div class="slider-container">
            <span style="font-size:12px;color:var(--green)">Easy</span>
            <input type="range" id="cardioIntensity" min="1" max="10" value="${savedIntensity}">
            <span style="font-size:12px;color:var(--red)">Max</span>
          </div>
        </div>
      </div>
    `;
    document.getElementById('cardioIntensity').addEventListener('input', function() {
      document.getElementById('intensityVal').textContent = this.value;
    });
    return;
  }

  const data = getData();
  const allSortedWorkouts = data.workouts
    .filter(w => !logEditingId || w.id !== logEditingId)
    .sort((a,b) => b.date.localeCompare(a.date));

  let html = '';

  // Warm-up section (collapsible checkboxes)
  const warmupExercises = program.exercises.filter(e => e.type === 'warmup');
  if (warmupExercises.length > 0) {
    html += `<div class="warmup-section">
      <div class="warmup-toggle" onclick="toggleWarmup()">
        <h3>Warm-Up / Mobility (10 min)</h3>
        <span class="toggle-icon" id="warmupToggleIcon">&#9660;</span>
      </div>
      <div class="warmup-items collapsed" id="warmupItems">`;
    warmupExercises.forEach((ex, i) => {
      const checked = savedWarmup ? savedWarmup[i] : false;
      html += `<div class="warmup-item">
        <input type="checkbox" id="warmup-${i}" ${checked ? 'checked' : ''}>
        <div>
          <label for="warmup-${i}">${ex.name}</label>
          <div class="warmup-detail">${ex.reps}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Non-warmup exercises
  const mainExercises = program.exercises.filter(e => e.type !== 'warmup');
  mainExercises.forEach((ex, exIdx) => {
    const saved = savedExercises?.find(s => s.name === ex.name);
    const lastW = allSortedWorkouts.find(w => w.exercises?.some(e => e.name === ex.name));
    const last = lastW?.exercises?.find(e => e.name === ex.name);
    const numSets = saved ? saved.sets.length : ex.sets;

    html += `<div class="exercise-card" data-exercise="${ex.name}" data-type="${ex.type}">
      <div class="ex-header">
        <div>
          <div class="ex-name">${ex.name}</div>
          <div class="ex-target">${ex.sets} x ${ex.reps}</div>
        </div>
        ${last ? `<span style="font-size:11px;color:var(--text2);">Last: ${last.sets.filter(s=>s.weight>0||s.reps).map(s=> s.weight > 0 ? s.weight+'x'+s.reps : s.reps).join(', ') || 'logged'}</span>` : ''}
      </div>
      <div class="sets-container" id="sets-${exIdx}">`;

    for (let s = 0; s < numSets; s++) {
      const w = saved ? saved.sets[s]?.weight || '' : '';
      const r = saved ? saved.sets[s]?.reps || '' : '';
      html += setRowHTML(exIdx, s, w, r, false);
    }

    html += `</div>
      <button class="add-set-btn" onclick="addSet(${exIdx})">+ Add Set</button>
    </div>`;
  });

  container.innerHTML = html;
}

function toggleWarmup() {
  const items = document.getElementById('warmupItems');
  const icon = document.getElementById('warmupToggleIcon');
  items.classList.toggle('collapsed');
  icon.classList.toggle('open');
}

function setRowHTML(exIdx, setIdx, weight, reps, isDurationOnly) {
  if (isDurationOnly) {
    return `<div class="set-row">
      <span class="set-num">Set ${setIdx+1}</span>
      <input type="text" placeholder="Duration/reps" value="${reps}" data-ex="${exIdx}" data-set="${setIdx}" data-field="reps">
    </div>`;
  }
  return `<div class="set-row">
    <span class="set-num">Set ${setIdx+1}</span>
    <input type="number" placeholder="lbs" value="${weight}" data-ex="${exIdx}" data-set="${setIdx}" data-field="weight" step="2.5" inputmode="decimal">
    <span style="font-size:12px;color:var(--text2);">x</span>
    <input type="number" placeholder="reps" value="${reps}" data-ex="${exIdx}" data-set="${setIdx}" data-field="reps" inputmode="numeric">
    <button class="remove-set" onclick="removeSet(this)" title="Remove set">&times;</button>
  </div>`;
}

function addSet(exIdx) {
  const container = document.getElementById('sets-' + exIdx);
  const setCount = container.querySelectorAll('.set-row').length;
  const div = document.createElement('div');
  div.innerHTML = setRowHTML(exIdx, setCount, '', '', false);
  container.appendChild(div.firstElementChild);
}

function removeSet(btn) {
  const row = btn.closest('.set-row');
  const container = row.parentElement;
  if (container.querySelectorAll('.set-row').length > 1) {
    row.remove();
    container.querySelectorAll('.set-row').forEach((r,i) => {
      r.querySelector('.set-num').textContent = 'Set ' + (i+1);
    });
  }
}

function saveWorkout() {
  const date = document.getElementById('logDate').value;
  const dayType = document.getElementById('logDayType').value;
  const bodyweight = parseFloat(document.getElementById('logBodyweight').value) || null;
  const notes = document.getElementById('logNotes').value.trim();

  if (!date) { showToast('Please select a date'); return; }

  const program = PROGRAM[dayType];
  const exercises = [];
  let warmupDone = null;

  if (isCardioDay(dayType)) {
    const durEl = document.getElementById('cardioDuration');
    const intEl = document.getElementById('cardioIntensity');
    const duration = durEl ? (parseInt(durEl.value) || 0) : 0;
    const intensity = intEl ? (parseInt(intEl.value) || 5) : 5;
    exercises.push({ name: program.label + ' Cardio', sets:[{ weight:0, reps:duration, duration, intensity }] });
  } else {
    // Collect warmup checkboxes
    const warmupExercises = program.exercises.filter(e => e.type === 'warmup');
    if (warmupExercises.length > 0) {
      warmupDone = [];
      warmupExercises.forEach((ex, i) => {
        const cb = document.getElementById('warmup-' + i);
        warmupDone.push(cb ? cb.checked : false);
      });
    }

    // Collect main exercise data
    const mainExercises = program.exercises.filter(e => e.type !== 'warmup');
    mainExercises.forEach((ex, exIdx) => {
      const setsContainer = document.getElementById('sets-' + exIdx);
      if (!setsContainer) return;
      const rows = setsContainer.querySelectorAll('.set-row');
      const sets = [];
      rows.forEach(row => {
        const wInput = row.querySelector('[data-field="weight"]');
        const rInput = row.querySelector('[data-field="reps"]');
        const w = wInput ? parseFloat(wInput.value) || 0 : 0;
        const r = rInput ? (parseFloat(rInput.value) || rInput.value || 0) : 0;
        sets.push({ weight: w, reps: typeof r === 'string' ? r : (parseInt(r) || 0) });
      });
      exercises.push({ name: ex.name, sets });
    });
  }

  const data = getData();

  const workoutEntry = { date, dayType, exercises, notes, bodyweight };
  if (warmupDone) workoutEntry.warmupDone = warmupDone;

  if (logEditingId) {
    const idx = data.workouts.findIndex(w => w.id === logEditingId);
    if (idx !== -1) {
      data.workouts[idx] = { ...data.workouts[idx], ...workoutEntry };
    }
    logEditingId = null;
    showToast('Workout updated!');
  } else {
    const existing = data.workouts.findIndex(w => w.date === date && w.dayType === dayType);
    if (existing !== -1) {
      if (!confirm('A workout already exists for this date and day type. Overwrite it?')) return;
      data.workouts[existing] = { id:data.workouts[existing].id, ...workoutEntry };
    } else {
      data.workouts.push({ id:generateId(), ...workoutEntry });
    }
    showToast('Workout saved!');
  }

  saveData(data);
  showPage('dashboard');
}

// ==================== PROGRESS CHARTS ====================
let progressChart = null;
let bwChart = null;
let chartMode = 'weight';

function getAllStrengthExercises() {
  const allExercises = new Set();
  Object.values(PROGRAMS).forEach(month => {
    Object.values(month.program).forEach(day => {
      day.exercises.forEach(ex => {
        if (ex.type === 'strength') allExercises.add(ex.name);
      });
    });
  });
  return allExercises;
}

function initChartsPage() {
  const select = document.getElementById('chartExercise');
  const allExercises = getAllStrengthExercises();

  select.innerHTML = '';
  KEY_LIFTS.forEach(name => {
    if (allExercises.has(name)) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      select.appendChild(opt);
    }
  });
  allExercises.forEach(name => {
    if (!KEY_LIFTS.includes(name)) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      select.appendChild(opt);
    }
  });

  renderProgressChart();
  renderBodyweightChart();
}

function setChartMode(mode) {
  chartMode = mode;
  document.getElementById('chartModeWeight').className = mode === 'weight' ? 'btn small' : 'btn small secondary';
  document.getElementById('chartMode1rm').className = mode === 'e1rm' ? 'btn small' : 'btn small secondary';
  renderProgressChart();
}

function epley1RM(weight, reps) {
  if (reps <= 0 || weight <= 0) return 0;
  if (reps === 1) return weight;
  return weight * (1 + reps / 30);
}

function renderProgressChart() {
  const exercise = document.getElementById('chartExercise').value;
  if (!exercise) return;
  const data = getData();

  const points = [];
  data.workouts
    .filter(w => w.exercises?.some(e => e.name === exercise))
    .sort((a,b) => a.date.localeCompare(b.date))
    .forEach(w => {
      const ex = w.exercises.find(e => e.name === exercise);
      if (!ex) return;
      const validSets = ex.sets.filter(s => s.weight > 0 && s.reps > 0);
      if (validSets.length === 0) return;
      if (chartMode === 'weight') {
        const best = validSets.reduce((a,b) => a.weight > b.weight ? a : b);
        points.push({ x: w.date, y: best.weight });
      } else {
        const best1rm = Math.max(...validSets.map(s => epley1RM(s.weight, typeof s.reps === 'number' ? s.reps : parseInt(s.reps) || 0)));
        points.push({ x: w.date, y: Math.round(best1rm) });
      }
    });

  if (progressChart) progressChart.destroy();

  const ctx = document.getElementById('progressChart').getContext('2d');
  progressChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: points.map(p => p.x),
      datasets: [{
        label: chartMode === 'weight' ? 'Best Weight (lbs)' : 'Est. 1RM (lbs)',
        data: points.map(p => p.y),
        borderColor: '#6c5ce7',
        backgroundColor: 'rgba(108,92,231,0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 4,
        pointBackgroundColor: '#a29bfe',
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color:'#e4e6ef' } },
      },
      scales: {
        x: { ticks:{ color:'#8b8fa3', maxTicksLimit:8 }, grid:{ color:'#2e3345' } },
        y: { ticks:{ color:'#8b8fa3' }, grid:{ color:'#2e3345' }, beginAtZero:false }
      }
    }
  });
}

function renderBodyweightChart() {
  const data = getData();
  const bwPoints = data.workouts
    .filter(w => w.bodyweight)
    .sort((a,b) => a.date.localeCompare(b.date))
    .map(w => ({ x:w.date, y:w.bodyweight }));

  if (bwChart) bwChart.destroy();

  const ctx = document.getElementById('bwChart').getContext('2d');
  bwChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: bwPoints.map(p => p.x),
      datasets: [{
        label: 'Bodyweight (lbs)',
        data: bwPoints.map(p => p.y),
        borderColor: '#00cec9',
        backgroundColor: 'rgba(0,206,201,0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 4,
        pointBackgroundColor: '#00cec9',
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels:{ color:'#e4e6ef' } },
      },
      scales: {
        x: { ticks:{ color:'#8b8fa3', maxTicksLimit:8 }, grid:{ color:'#2e3345' } },
        y: { ticks:{ color:'#8b8fa3' }, grid:{ color:'#2e3345' }, beginAtZero:false }
      }
    }
  });
}

// ==================== HISTORY / CALENDAR ====================
let calYear, calMonth;

function renderHistory() {
  const now = new Date();
  if (calYear === undefined) { calYear = now.getFullYear(); calMonth = now.getMonth(); }
  renderCalendar();
  renderHistoryList();
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
  renderHistoryList();
}

function renderCalendar() {
  const label = document.getElementById('calMonthLabel');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  label.textContent = months[calMonth] + ' ' + calYear;

  const grid = document.getElementById('calGrid');
  const data = getData();
  const today = formatDate(new Date());

  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth + 1, 0);
  let startDay = firstDay.getDay();
  if (startDay === 0) startDay = 7;

  let html = '';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
    html += `<div class="cal-header">${d}</div>`;
  });

  for (let i = 1; i < startDay; i++) {
    html += '<div class="cal-day empty"></div>';
  }

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const workout = data.workouts.find(w => w.date === dateStr);
    let cls = 'cal-day';
    if (dateStr === today) cls += ' today';
    if (workout) cls += ` has-workout wt-${workout.dayType}`;
    html += `<div class="${cls}" onclick="viewSession('${dateStr}')">${d}</div>`;
  }

  grid.innerHTML = html;
}

function renderHistoryList() {
  const data = getData();
  const container = document.getElementById('historyList');
  const monthWorkouts = data.workouts
    .filter(w => {
      const d = new Date(w.date);
      return d.getFullYear() === calYear && d.getMonth() === calMonth;
    })
    .sort((a,b) => b.date.localeCompare(a.date));

  if (monthWorkouts.length === 0) {
    container.innerHTML = '<p style="color:var(--text2);font-size:14px;text-align:center;">No workouts this month.</p>';
    return;
  }

  container.innerHTML = monthWorkouts.map(w => {
    const p = PROGRAM[w.dayType];
    return `<div class="card" style="cursor:pointer;" onclick="viewSession('${w.date}')">
      <div class="flex-between">
        <div>
          <span class="day-badge day-${w.dayType}" style="margin-right:8px;">${w.dayType.charAt(0).toUpperCase()+w.dayType.slice(1)}</span>
          <span style="font-size:14px;">${formatDateDisplay(w.date)}</span>
        </div>
        <span style="font-size:12px;color:var(--text2);">
          ${w.exercises.filter(e=>e.sets.some(s=>s.weight>0)).length} exercises
        </span>
      </div>
    </div>`;
  }).join('');
}

function viewSession(dateStr) {
  const data = getData();
  const workouts = data.workouts.filter(w => w.date === dateStr);
  if (workouts.length === 0) return;

  const modal = document.getElementById('sessionModal');
  const content = document.getElementById('sessionModalContent');

  let html = '';
  workouts.forEach(w => {
    const p = PROGRAM[w.dayType];
    html += `<h2>${formatDateDisplay(w.date)}</h2>`;
    html += `<div class="mb-8"><span class="day-badge day-${w.dayType}">${w.dayType.charAt(0).toUpperCase()+w.dayType.slice(1)} - ${p?.label || ''}</span></div>`;

    if (w.bodyweight) html += `<p style="font-size:13px;color:var(--text2);margin-bottom:8px;">Bodyweight: ${w.bodyweight} lbs</p>`;

    // Show warmup completion
    if (w.warmupDone) {
      const completed = w.warmupDone.filter(Boolean).length;
      const total = w.warmupDone.length;
      html += `<p style="font-size:13px;color:var(--text2);margin-bottom:8px;">Warm-up: ${completed}/${total} completed</p>`;
    }

    w.exercises.forEach(ex => {
      const validSets = ex.sets.filter(s => s.weight > 0 || s.reps || s.duration);
      if (validSets.length === 0) return;
      // Cardio session display
      if (ex.sets[0]?.duration !== undefined && ex.sets[0]?.intensity !== undefined) {
        html += `<div style="margin-bottom:10px;">
          <div style="font-weight:600;font-size:14px;">${ex.name}</div>
          <div style="font-size:13px;color:var(--text2);">Duration: ${ex.sets[0].duration} min &bull; Intensity: ${ex.sets[0].intensity}/10</div>
        </div>`;
        return;
      }
      html += `<div style="margin-bottom:10px;">
        <div style="font-weight:600;font-size:14px;">${ex.name}</div>
        ${validSets.map((s,i) => `<div style="font-size:13px;color:var(--text2);padding:2px 0;">Set ${i+1}: ${s.weight > 0 ? s.weight + ' lbs x ' : ''}${s.reps}${typeof s.reps === 'number' && s.weight > 0 ? ' reps' : ''}</div>`).join('')}
      </div>`;
    });

    if (w.notes) html += `<p style="font-size:13px;color:var(--text2);margin-top:4px;">${w.notes}</p>`;

    html += `<div class="flex gap-8 mt-12">
      <button class="btn small" onclick="editWorkout('${w.id}')">Edit</button>
      <button class="btn small danger" onclick="deleteWorkout('${w.id}')">Delete</button>
    </div>`;
  });

  content.innerHTML = html;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('sessionModal').classList.remove('active');
}

function editWorkout(id) {
  closeModal();
  showPage('log');
  initLogPage(id);
}

function deleteWorkout(id) {
  if (!confirm('Delete this workout?')) return;
  const data = getData();
  data.workouts = data.workouts.filter(w => w.id !== id);
  saveData(data);
  closeModal();
  renderHistory();
  showToast('Workout deleted');
}

// ==================== PR BOARD ====================
function calculatePRs() {
  const data = getData();
  const prs = {};

  data.workouts.sort((a,b) => a.date.localeCompare(b.date)).forEach(w => {
    w.exercises.forEach(ex => {
      if (!prs[ex.name]) {
        prs[ex.name] = { bestWeight:0, bestWeightReps:0, bestWeightDate:null, bestRepsWeight:0, bestReps:0, bestRepsDate:null, best1RM:0, best1RMDate:null };
      }
      const pr = prs[ex.name];
      ex.sets.forEach(s => {
        const weight = s.weight;
        const reps = typeof s.reps === 'number' ? s.reps : parseInt(s.reps) || 0;
        if (weight <= 0 || reps <= 0) return;

        if (weight > pr.bestWeight) {
          pr.bestWeight = weight;
          pr.bestWeightReps = reps;
          pr.bestWeightDate = w.date;
        }
        if (reps > pr.bestReps || (reps === pr.bestReps && weight > pr.bestRepsWeight)) {
          pr.bestReps = reps;
          pr.bestRepsWeight = weight;
          pr.bestRepsDate = w.date;
        }
        const e1rm = epley1RM(weight, reps);
        if (e1rm > pr.best1RM) {
          pr.best1RM = e1rm;
          pr.best1RMDate = w.date;
        }
      });
    });
  });

  return prs;
}

function renderPRBoard() {
  const prs = calculatePRs();
  const container = document.getElementById('prBoard');
  const sevenDaysAgo = new Date();
  sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

  const exercisesWithPRs = Object.entries(prs)
    .filter(([name, pr]) => pr.bestWeight > 0)
    .sort((a,b) => {
      const aKey = KEY_LIFTS.indexOf(a[0]);
      const bKey = KEY_LIFTS.indexOf(b[0]);
      if (aKey !== -1 && bKey !== -1) return aKey - bKey;
      if (aKey !== -1) return -1;
      if (bKey !== -1) return 1;
      return a[0].localeCompare(b[0]);
    });

  if (exercisesWithPRs.length === 0) {
    container.innerHTML = '<p style="color:var(--text2);text-align:center;">No data yet. Log some workouts to see your PRs!</p>';
    return;
  }

  container.innerHTML = exercisesWithPRs.map(([name, pr]) => {
    const isRecentWeight = pr.bestWeightDate && new Date(pr.bestWeightDate) >= sevenDaysAgo;
    const isRecent1RM = pr.best1RMDate && new Date(pr.best1RMDate) >= sevenDaysAgo;
    return `<div class="pr-card">
      <div class="pr-exercise">${name}</div>
      <div class="pr-row">
        <span>Best Weight</span>
        <span class="pr-value">${pr.bestWeight} lbs x ${pr.bestWeightReps}${isRecentWeight ? '<span class="pr-new">NEW</span>' : ''}</span>
      </div>
      <div class="pr-row">
        <span>Est. 1RM</span>
        <span class="pr-value">${pr.best1RM.toFixed(0)} lbs${isRecent1RM ? '<span class="pr-new">NEW</span>' : ''}</span>
      </div>
      <div class="pr-row">
        <span>Best Reps</span>
        <span class="pr-value">${pr.bestReps} @ ${pr.bestRepsWeight} lbs</span>
      </div>
    </div>`;
  }).join('');
}

// ==================== HELPERS ====================
function formatDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDateDisplay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
}

// ==================== PWA SERVICE WORKER ====================
if ('serviceWorker' in navigator) {
  // Nuke old caches and force update
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  }).then(() => {
    navigator.serviceWorker.register('sw.js?v=3').catch(() => {});
  });
}

// ==================== INIT ====================
document.addEventListener('DOMContentLoaded', () => {
  initProgramSelector();
  renderDashboard();
});

document.getElementById('sessionModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
